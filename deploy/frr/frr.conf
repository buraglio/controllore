! Controllore Reference FRR Configuration
! FRR acting as PCEP PCC (pathd) and BGP-LS source
! Requires: FRR 8.4+ with pathd, bgpd, isisd

frr version 10.0
frr defaults traditional
hostname frr-pcc
log syslog informational
service integrated-vtysh-config

!
! IS-IS with SRv6 and flex-algorithm
!
router isis CORE
 net 49.0000.0000.0001.00
 is-type level-2-only
 !
 segment-routing on
 segment-routing global-block 16000 23999
 segment-routing node-msd 10
 !
 segment-routing srv6
  locator CORE
 !
 !
 flex-algo 128
  metric-type delay
  advertise-definition
 !
 flex-algo 129
  metric-type te-default
  advertise-definition
 !
!
interface lo
 ip address 192.0.2.10/32
 ipv6 address 2001:db8::10/128
 isis enable CORE
 isis passive
!
interface eth0
 ip address 172.20.0.10/24
 isis enable CORE
 isis metric 10
 isis hello-multiplier 3
 isis hello-interval 3
!

!
! SRv6 Locator configuration
!
segment-routing
 srv6
  locators
   locator CORE
    prefix 2001:db8:1::/48 block-len 32 node-len 16
    behavior usid
   !
  !
 !
!

!
! BGP configuration — BGP-LS session to Controllore PCE
!
router bgp 65000
 bgp router-id 192.0.2.10
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 neighbor 172.20.0.254 remote-as 65000
 neighbor 172.20.0.254 description controllore-pce
 neighbor 172.20.0.254 update-source lo
 !
 address-family link-state
  neighbor 172.20.0.254 activate
 !
!

!
! PCEP PCC (pathd) configuration  
!
segment-routing
 traffic-eng
  pcep
   pce CONTROLLORE-PCE
    state-sync-avoidance
    address ip 172.20.0.254
    port 4189
    !
    config
     sr-draft07
    !
   !
   pcc
    peer CONTROLLORE-PCE
    flag-delegation
    !
    sr-policy color 10 endpoint 2001:db8::20
     candidate-path preference 100 name "via-controllore" dynamic
      pcep
      !
     !
    !
   !
  !
 !
!

line vty
!
