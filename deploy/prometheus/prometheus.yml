global_options:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'controllore-pce'
    static_configs:
      - targets: ['pced:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
